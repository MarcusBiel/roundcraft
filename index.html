<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roundcraft</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #79b9e8;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      canvas {
        display: block;
      }

      #startScreen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 44%, rgba(255, 130, 24, 0.24), transparent 0 24rem),
          rgba(8, 18, 28, 0.72);
        z-index: 20;
        cursor: pointer;
      }

      #startBox {
        text-align: center;
        padding: 1.5rem 1.75rem;
      }

      #startBox h1 {
        margin: 0 0 0.45rem;
        font-size: clamp(2.25rem, 7vw, 5rem);
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 0.25rem 1.5rem rgba(0, 0, 0, 0.38);
      }

      #startBox p {
        margin: 0.25rem 0;
        font-size: clamp(1.05rem, 2.4vw, 1.35rem);
        text-shadow: 0 0.15rem 0.6rem rgba(0, 0, 0, 0.45);
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }

      #inventory {
        position: absolute;
        top: 1rem;
        right: 1rem;
        min-width: 12.5rem;
        padding: 0.7rem 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.45rem;
        background: rgba(10, 21, 28, 0.62);
        box-shadow: 0 0.6rem 1.6rem rgba(0, 0, 0, 0.18);
        font-weight: 700;
        line-height: 1.35;
      }

      #message {
        position: absolute;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        max-width: min(30rem, calc(100vw - 2rem));
        padding: 0.58rem 0.8rem;
        border-radius: 0.45rem;
        background: rgba(10, 21, 28, 0.58);
        text-align: center;
        font-weight: 700;
        opacity: 0;
        transition: opacity 0.18s ease;
      }

      #message.visible {
        opacity: 1;
      }

      #crosshair {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 0.9rem;
        height: 0.9rem;
        transform: translate(-50%, -50%);
      }

      #crosshair::before,
      #crosshair::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 0 0.2rem rgba(0, 0, 0, 0.5);
      }

      #crosshair::before {
        left: 50%;
        top: 0;
        width: 0.12rem;
        height: 100%;
        transform: translateX(-50%);
      }

      #crosshair::after {
        left: 0;
        top: 50%;
        width: 100%;
        height: 0.12rem;
        transform: translateY(-50%);
      }

      #minePanel {
        position: absolute;
        left: 50%;
        bottom: 2rem;
        width: min(22rem, calc(100vw - 2rem));
        transform: translateX(-50%);
        opacity: 0;
        transition: opacity 0.12s ease;
      }

      #minePanel.visible {
        opacity: 1;
      }

      #mineLabel {
        margin-bottom: 0.45rem;
        text-align: center;
        font-weight: 800;
        text-shadow: 0 0.15rem 0.35rem rgba(0, 0, 0, 0.45);
      }

      #mineTrack {
        height: 0.9rem;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        background: rgba(5, 15, 20, 0.64);
      }

      #mineFill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ffd24a, #ff7a1a, #ef2a14);
        box-shadow: 0 0 0.8rem rgba(255, 111, 20, 0.7);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="startScreen">
      <div id="startBox">
        <h1>Roundcraft</h1>
        <p>Click to play.</p>
      </div>
    </div>

    <div id="hud">
      <div id="inventory">Inventory<br />Lava Crystals: <span id="crystalCount">0</span></div>
      <div id="message"></div>
      <div id="crosshair"></div>
      <div id="minePanel">
        <div id="mineLabel">Lava Crystal</div>
        <div id="mineTrack"><div id="mineFill"></div></div>
      </div>
    </div>

    <script type="module">
      import * as THREE from "three";

      /*
        Future Roundcraft ideas:
        - Monsters get angry when the player hits them.
        - There is an Ender dragon.
        - Beating the Ender dragon gives dragon meat, a diamond pickaxe, and flying.
        - Diamonds can later be found in secret treasure chests.
        - The pickaxe never breaks.
        - The pickaxe can later become stronger with fire/lava and diamond.
        - Befriending friendly creatures comes in a later version.
      */

      const playerHeight = 1.7;
      const walkSpeed = 7.2;
      const movementSharpness = 16;
      const gravity = 23;
      const jumpSpeed = 8.4;
      const mouseSensitivity = 0.00165;
      const lookSharpness = 28;
      const crystalMiningSeconds = 10;
      const crystalReach = 5.2;
      const worldHalfSize = 92;
      const pickaxeHitSeconds = 0.28;
      const lavaBubbleSoundMinSeconds = 0.36;
      const lavaBubbleSoundSpreadSeconds = 0.58;
      const volcanoCenter = new THREE.Vector3(0, 0, -34);

      const startScreen = requireElement("startScreen");
      const crystalCountLabel = requireElement("crystalCount");
      const minePanel = requireElement("minePanel");
      const mineFill = requireElement("mineFill");
      const message = requireElement("message");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x82c8f0);
      scene.fog = new THREE.Fog(0x82c8f0, 58, 145);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 450);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      const player = camera;
      player.position.set(0, playerHeight, 22);
      player.rotation.order = "YXZ";
      scene.add(player);

      const clock = new THREE.Clock();
      const velocity = new THREE.Vector3();
      const forwardVector = new THREE.Vector3();
      const rightVector = new THREE.Vector3();
      const desiredMove = new THREE.Vector3();
      const move = {
        forward: false,
        backward: false,
        left: false,
        right: false
      };
      let canJump = false;
      let mouseDown = false;
      let gameStarted = false;
      let pointerLocked = false;
      let pointerLockFallback = false;
      let dragLooking = false;
      let lastDragX = 0;
      let lastDragY = 0;
      let yaw = 0;
      let pitch = 0;
      let targetYaw = 0;
      let targetPitch = 0;
      let activeCrystal = null;
      let visibleCrystal = null;
      let miningProgress = 0;
      let minedCrystalCount = 0;
      let messageTimer = 0;
      let pickaxeSwing = 0;
      let audioContext = null;
      let audioMaster = null;
      let nextPickaxeHitTime = 0;
      let nextLavaBubbleSoundTime = 0;

      const raycaster = new THREE.Raycaster();
      const crystals = [];
      const crystalParts = [];
      const lavaBubbles = [];
      const lavaSparks = [];
      const lavaDrops = [];

      addLights();
      addGround();
      addVolcano();
      addCave();
      addTreasureChest();
      addCrystals();
      const pickaxe = addPickaxe();

      startScreen.addEventListener("click", () => {
        startGame();
      });

      document.addEventListener("keydown", handleKeyDown);
      document.addEventListener("keyup", handleKeyUp);
      document.addEventListener("mousedown", (event) => {
        if (event.button === 0 && gameStarted) {
          mouseDown = true;
        }
        if (event.button === 2 && gameStarted && !pointerLocked) {
          dragLooking = true;
          lastDragX = event.clientX;
          lastDragY = event.clientY;
        }
      });
      document.addEventListener("mouseup", (event) => {
        if (event.button === 0) {
          mouseDown = false;
        }
        if (event.button === 2) {
          dragLooking = false;
        }
      });
      document.addEventListener("mousemove", handleMouseLook);
      document.addEventListener("pointerlockchange", handlePointerLockChange);
      document.addEventListener("contextmenu", (event) => event.preventDefault());
      window.addEventListener("blur", stopPlayerInput);
      window.addEventListener("resize", resize);

      animate();

      function requireElement(id) {
        const element = document.getElementById(id);
        if (element === null) {
          throw new Error(`Missing required UI element: ${id}`);
        }
        return element;
      }

      async function startGame() {
        gameStarted = true;
        startScreen.style.display = "none";
        startAudio();

        if (!("requestPointerLock" in renderer.domElement)) {
          pointerLockFallback = true;
          showMessage("Mouse lock is missing. Hold right mouse to look.");
          return;
        }

        try {
          await renderer.domElement.requestPointerLock();
          pointerLockFallback = false;
        } catch (error) {
          pointerLockFallback = true;
          showMessage("Test browser: hold right mouse to look.");
        }
      }

      function handlePointerLockChange() {
        pointerLocked = document.pointerLockElement === renderer.domElement;

        if (pointerLocked) {
          gameStarted = true;
          startScreen.style.display = "none";
          return;
        }

        if (gameStarted && !pointerLockFallback) {
          gameStarted = false;
          mouseDown = false;
          dragLooking = false;
          startScreen.style.display = "grid";
        }
      }

      function handleMouseLook(event) {
        if (!gameStarted) {
          return;
        }

        if (pointerLocked) {
          turnView(event.movementX, event.movementY);
          return;
        }

        if (!dragLooking) {
          return;
        }

        const movementX = event.clientX - lastDragX;
        const movementY = event.clientY - lastDragY;
        lastDragX = event.clientX;
        lastDragY = event.clientY;
        turnView(movementX, movementY);
      }

      function turnView(movementX, movementY) {
        targetYaw -= movementX * mouseSensitivity;
        targetPitch -= movementY * mouseSensitivity;
        targetPitch = THREE.MathUtils.clamp(targetPitch, -Math.PI / 2 + 0.05, Math.PI / 2 - 0.05);
      }

      function stopPlayerInput() {
        move.forward = false;
        move.backward = false;
        move.left = false;
        move.right = false;
        mouseDown = false;
        dragLooking = false;
      }

      function addLights() {
        const skyLight = new THREE.HemisphereLight(0xd7f2ff, 0x5a4028, 2.3);
        scene.add(skyLight);

        const sun = new THREE.DirectionalLight(0xffffff, 2.2);
        sun.position.set(28, 48, 24);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -55;
        sun.shadow.camera.right = 55;
        sun.shadow.camera.top = 55;
        sun.shadow.camera.bottom = -55;
        scene.add(sun);

        const lavaLight = new THREE.PointLight(0xff5a19, 16, 42, 1.8);
        lavaLight.position.set(0, 7, -24);
        scene.add(lavaLight);
      }

      function addGround() {
        const groundMaterial = new THREE.MeshStandardMaterial({
          color: 0x6daf45,
          roughness: 0.92,
          metalness: 0
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(220, 220, 1, 1), groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const pathMaterial = new THREE.MeshStandardMaterial({
          color: 0x6f5a3d,
          roughness: 0.95
        });
        const path = new THREE.Mesh(new THREE.CircleGeometry(21, 64), pathMaterial);
        path.position.set(0, 0.012, -18);
        path.rotation.x = -Math.PI / 2;
        path.scale.set(1, 0.72, 1);
        scene.add(path);
      }

      function addVolcano() {
        const volcano = new THREE.Group();
        volcano.position.copy(volcanoCenter);
        scene.add(volcano);

        const volcanoMaterial = new THREE.MeshStandardMaterial({
          color: 0x4c3326,
          roughness: 0.88,
          metalness: 0,
          flatShading: false
        });

        const cone = new THREE.Mesh(new THREE.CylinderGeometry(5.4, 17, 14, 96, 1, false), volcanoMaterial);
        cone.position.y = 7;
        cone.castShadow = true;
        cone.receiveShadow = true;
        volcano.add(cone);

        const rimMaterial = new THREE.MeshStandardMaterial({
          color: 0x2f201a,
          roughness: 0.9
        });
        const rim = new THREE.Mesh(new THREE.TorusGeometry(5.45, 0.7, 16, 96), rimMaterial);
        rim.position.y = 14.18;
        rim.rotation.x = Math.PI / 2;
        rim.castShadow = true;
        volcano.add(rim);

        const lavaMaterial = makeLavaMaterial();
        const lavaPool = new THREE.Mesh(new THREE.CylinderGeometry(4.8, 4.8, 0.26, 80), lavaMaterial);
        lavaPool.position.y = 14.22;
        volcano.add(lavaPool);

        const flow = new THREE.Mesh(makeLavaFlowGeometry(), lavaMaterial);
        flow.position.y = 0.08;
        volcano.add(flow);

        for (let index = 0; index < 18; index += 1) {
          const bubble = makeBubble(index, volcano.localToWorld(new THREE.Vector3(
            Math.sin(index * 2.1) * 3.2,
            14.42,
            Math.cos(index * 1.7) * 3.2
          )));
          lavaBubbles.push(bubble);
          scene.add(bubble.mesh);
        }

        for (let index = 0; index < 18; index += 1) {
          const t = index / 17;
          const point = lavaFlowPoint(t);
          const bubble = makeBubble(50 + index, volcano.localToWorld(point.add(new THREE.Vector3(0, 0.22, 0))));
          lavaBubbles.push(bubble);
          scene.add(bubble.mesh);
        }

        for (let index = 0; index < 28; index += 1) {
          lavaSparks.push(makeSpark(index, new THREE.Vector3(0, 3.2, -19.5)));
        }

        for (let index = 0; index < 18; index += 1) {
          lavaDrops.push(makeLavaDrop(index, volcano));
        }
      }

      function makeLavaMaterial() {
        return new THREE.MeshStandardMaterial({
          color: 0xff6a18,
          emissive: 0xff2e08,
          emissiveIntensity: 1.65,
          roughness: 0.38,
          metalness: 0,
          transparent: true,
          opacity: 0.95,
          side: THREE.DoubleSide
        });
      }

      function makeLavaFlowGeometry() {
        const vertices = [];
        const indices = [];
        const segments = 24;

        for (let index = 0; index <= segments; index += 1) {
          const t = index / segments;
          const center = lavaFlowPoint(t);
          const width = 1.75 + t * 1.4;
          vertices.push(center.x - width / 2, center.y, center.z);
          vertices.push(center.x + width / 2, center.y, center.z);
        }

        for (let index = 0; index < segments; index += 1) {
          const leftTop = index * 2;
          const rightTop = leftTop + 1;
          const leftBottom = leftTop + 2;
          const rightBottom = leftTop + 3;
          indices.push(leftTop, leftBottom, rightTop, rightTop, leftBottom, rightBottom);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        return geometry;
      }

      function lavaFlowPoint(t) {
        return new THREE.Vector3(
          Math.sin(t * Math.PI * 2) * 0.38,
          14.15 - 13.95 * t,
          4.6 + 12.8 * t
        );
      }

      function makeBubble(seed, position) {
        const material = new THREE.MeshStandardMaterial({
          color: 0xffcf4a,
          emissive: 0xff5c0d,
          emissiveIntensity: 1.25,
          roughness: 0.2
        });
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.18 + seededWave(seed) * 0.08, 12, 8), material);
        mesh.position.copy(position);
        return {
          mesh,
          seed,
          baseY: position.y,
          baseScale: 0.45 + seededWave(seed + 8) * 0.65
        };
      }

      function makeSpark(seed, origin) {
        const material = new THREE.MeshBasicMaterial({
          color: seed % 3 === 0 ? 0xfff07a : 0xff6c1c
        });
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 6), material);
        scene.add(mesh);
        return {
          mesh,
          seed,
          origin,
          height: 1.8 + seededWave(seed + 3) * 3.8,
          side: 0.7 + seededWave(seed + 11) * 2.2,
          speed: 0.34 + seededWave(seed + 17) * 0.45
        };
      }

      function makeLavaDrop(seed, volcano) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.14 + seededWave(seed) * 0.07, 10, 8),
          new THREE.MeshStandardMaterial({
            color: 0xff8a20,
            emissive: 0xff2708,
            emissiveIntensity: 1.8,
            roughness: 0.3
          })
        );
        scene.add(mesh);
        return {
          mesh,
          seed,
          volcano,
          speed: 0.18 + seededWave(seed + 9) * 0.2
        };
      }

      function addCave() {
        const cave = new THREE.Group();
        cave.position.set(-17, 0, -9);
        scene.add(cave);

        const rockMaterial = new THREE.MeshStandardMaterial({
          color: 0x5d5b56,
          roughness: 0.95,
          metalness: 0
        });
        const darkMaterial = new THREE.MeshStandardMaterial({
          color: 0x111416,
          roughness: 1,
          side: THREE.DoubleSide
        });

        const mound = new THREE.Mesh(new THREE.SphereGeometry(1, 48, 24), rockMaterial);
        mound.scale.set(6.4, 3.2, 4.4);
        mound.position.y = 1.45;
        mound.castShadow = true;
        mound.receiveShadow = true;
        cave.add(mound);

        const entranceShape = new THREE.Shape();
        entranceShape.moveTo(-2.25, 0);
        entranceShape.lineTo(-2.25, 1.65);
        entranceShape.quadraticCurveTo(0, 3.75, 2.25, 1.65);
        entranceShape.lineTo(2.25, 0);
        entranceShape.lineTo(-2.25, 0);

        const entrance = new THREE.Mesh(new THREE.ShapeGeometry(entranceShape), darkMaterial);
        entrance.position.set(0, 0.05, 4.16);
        cave.add(entrance);

        const caveFloor = new THREE.Mesh(new THREE.CircleGeometry(2.35, 32), darkMaterial);
        caveFloor.position.set(0, 0.045, 3.35);
        caveFloor.rotation.x = -Math.PI / 2;
        caveFloor.scale.set(1, 0.7, 1);
        cave.add(caveFloor);

        const stonePositions = [
          [-2.7, 0.36, 3.92, 0.7],
          [-1.55, 2.25, 4.08, 0.62],
          [0, 3.12, 4.1, 0.68],
          [1.58, 2.2, 4.08, 0.58],
          [2.68, 0.38, 3.92, 0.72]
        ];

        for (const [x, y, z, scale] of stonePositions) {
          const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(scale, 0), rockMaterial);
          stone.position.set(x, y, z);
          stone.rotation.set(y * 0.2, x * 0.15, z * 0.1);
          stone.castShadow = true;
          cave.add(stone);
        }
      }

      function addTreasureChest() {
        const chest = new THREE.Group();
        chest.position.set(-8.4, 0, 4.2);
        chest.rotation.y = 0.35;
        scene.add(chest);

        const woodMaterial = new THREE.MeshStandardMaterial({
          color: 0x7b421e,
          roughness: 0.76
        });
        const darkWoodMaterial = new THREE.MeshStandardMaterial({
          color: 0x4c2715,
          roughness: 0.82
        });
        const goldMaterial = new THREE.MeshStandardMaterial({
          color: 0xf2c94c,
          emissive: 0x6a3d00,
          emissiveIntensity: 0.12,
          roughness: 0.34,
          metalness: 0.45
        });

        const base = new THREE.Mesh(new THREE.BoxGeometry(2.55, 0.9, 1.5), woodMaterial);
        base.position.y = 0.48;
        base.castShadow = true;
        base.receiveShadow = true;
        chest.add(base);

        const lid = new THREE.Mesh(new THREE.BoxGeometry(2.68, 0.48, 1.58), darkWoodMaterial);
        lid.position.set(0, 1.14, -0.04);
        lid.rotation.x = -0.1;
        lid.castShadow = true;
        chest.add(lid);

        const leftBand = new THREE.Mesh(new THREE.BoxGeometry(0.16, 1.48, 1.68), goldMaterial);
        leftBand.position.set(-0.78, 0.78, 0);
        chest.add(leftBand);

        const rightBand = leftBand.clone();
        rightBand.position.x = 0.78;
        chest.add(rightBand);

        const latch = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.38, 0.12), goldMaterial);
        latch.position.set(0, 0.76, 0.82);
        chest.add(latch);

        const glow = new THREE.PointLight(0xffc95c, 2.6, 7, 2.2);
        glow.position.set(0, 1.1, 0.3);
        chest.add(glow);
      }

      function addCrystals() {
        const positions = [
          new THREE.Vector3(-6.5, 0, -17.5),
          new THREE.Vector3(5.8, 0, -15.2),
          new THREE.Vector3(1.4, 0, -9.2),
          new THREE.Vector3(10.4, 0, -23.5)
        ];

        for (let index = 0; index < positions.length; index += 1) {
          const crystal = makeCrystal(index, positions[index]);
          crystals.push(crystal);
          scene.add(crystal);
        }
      }

      function makeCrystal(index, position) {
        const crystal = new THREE.Group();
        crystal.name = `LavaCrystal${index + 1}`;
        crystal.position.copy(position);
        crystal.userData.isLavaCrystal = true;

        const mainMaterial = new THREE.MeshStandardMaterial({
          color: 0xff6229,
          emissive: 0xff2f08,
          emissiveIntensity: 0.85,
          roughness: 0.24,
          metalness: 0.05,
          transparent: true,
          opacity: 0.9
        });
        const brightMaterial = new THREE.MeshStandardMaterial({
          color: 0xffd36c,
          emissive: 0xff681c,
          emissiveIntensity: 1.15,
          roughness: 0.18,
          transparent: true,
          opacity: 0.78
        });

        const core = new THREE.Mesh(new THREE.OctahedronGeometry(0.74, 0), mainMaterial);
        core.scale.set(0.75, 2.05, 0.75);
        core.position.y = 1.25;
        core.castShadow = true;
        core.userData.crystalRoot = crystal;
        crystal.add(core);
        crystalParts.push(core);

        const shardOffsets = [
          [-0.78, 0.8, 0.14, 0.42, 1.3, 0.42, -0.22],
          [0.7, 0.68, -0.2, 0.38, 1.1, 0.38, 0.28],
          [0.15, 0.48, 0.72, 0.34, 0.95, 0.34, 0.1]
        ];

        for (const [x, y, z, sx, sy, sz, turn] of shardOffsets) {
          const shard = new THREE.Mesh(new THREE.OctahedronGeometry(0.64, 0), brightMaterial);
          shard.scale.set(sx, sy, sz);
          shard.position.set(x, y, z);
          shard.rotation.z = turn;
          shard.castShadow = true;
          shard.userData.crystalRoot = crystal;
          crystal.add(shard);
          crystalParts.push(shard);
        }

        const base = new THREE.Mesh(
          new THREE.CylinderGeometry(1.04, 1.16, 0.34, 9),
          new THREE.MeshStandardMaterial({ color: 0x3f2725, roughness: 0.9 })
        );
        base.position.y = 0.16;
        base.castShadow = true;
        base.receiveShadow = true;
        base.userData.crystalRoot = crystal;
        crystal.add(base);
        crystalParts.push(base);

        return crystal;
      }

      function addPickaxe() {
        const pickaxeGroup = new THREE.Group();
        pickaxeGroup.position.set(0.46, -0.44, -0.78);
        pickaxeGroup.rotation.set(-0.24, -0.42, -0.28);

        const handle = new THREE.Mesh(
          new THREE.CylinderGeometry(0.035, 0.045, 0.92, 10),
          new THREE.MeshStandardMaterial({ color: 0x6d4124, roughness: 0.72 })
        );
        handle.rotation.z = -0.32;
        handle.position.y = -0.12;
        pickaxeGroup.add(handle);

        const headMaterial = new THREE.MeshStandardMaterial({
          color: 0xa8b1ba,
          roughness: 0.36,
          metalness: 0.35
        });
        const head = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.72, 10), headMaterial);
        head.rotation.z = Math.PI / 2;
        head.position.y = 0.35;
        pickaxeGroup.add(head);

        const pointLeft = new THREE.Mesh(new THREE.ConeGeometry(0.095, 0.22, 10), headMaterial);
        pointLeft.rotation.z = Math.PI / 2;
        pointLeft.position.set(-0.46, 0.35, 0);
        pickaxeGroup.add(pointLeft);

        const pointRight = new THREE.Mesh(new THREE.ConeGeometry(0.095, 0.22, 10), headMaterial);
        pointRight.rotation.z = -Math.PI / 2;
        pointRight.position.set(0.46, 0.35, 0);
        pickaxeGroup.add(pointRight);

        camera.add(pickaxeGroup);
        return pickaxeGroup;
      }

      function startAudio() {
        if (audioContext !== null) {
          audioContext.resume();
          return;
        }

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          showMessage("This browser cannot play sound.");
          return;
        }

        audioContext = new AudioContextClass();
        audioMaster = audioContext.createGain();
        audioMaster.gain.value = 0.18;
        audioMaster.connect(audioContext.destination);
        addLavaAmbientSound();
      }

      function addLavaAmbientSound() {
        if (audioContext === null || audioMaster === null) {
          throw new Error("Audio must be started before lava sound is created.");
        }

        const seconds = 2;
        const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * seconds, audioContext.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);

        for (let index = 0; index < noiseData.length; index += 1) {
          noiseData[index] = Math.random() * 2 - 1;
        }

        const lavaNoise = audioContext.createBufferSource();
        lavaNoise.buffer = noiseBuffer;
        lavaNoise.loop = true;

        const lavaFilter = audioContext.createBiquadFilter();
        lavaFilter.type = "lowpass";
        lavaFilter.frequency.value = 260;
        lavaFilter.Q.value = 0.7;

        const lavaGain = audioContext.createGain();
        lavaGain.gain.value = 0.045;

        const lavaRumble = audioContext.createOscillator();
        lavaRumble.type = "sine";
        lavaRumble.frequency.value = 44;

        const rumbleGain = audioContext.createGain();
        rumbleGain.gain.value = 0.035;

        lavaNoise.connect(lavaFilter);
        lavaFilter.connect(lavaGain);
        lavaGain.connect(audioMaster);
        lavaRumble.connect(rumbleGain);
        rumbleGain.connect(audioMaster);

        lavaNoise.start();
        lavaRumble.start();
      }

      function playPickaxeHit() {
        if (audioContext === null || audioMaster === null) {
          return;
        }

        const start = audioContext.currentTime;
        const clang = audioContext.createOscillator();
        clang.type = "triangle";
        clang.frequency.setValueAtTime(760, start);
        clang.frequency.exponentialRampToValueAtTime(240, start + 0.13);

        const clangGain = audioContext.createGain();
        clangGain.gain.setValueAtTime(0.0001, start);
        clangGain.gain.exponentialRampToValueAtTime(0.11, start + 0.01);
        clangGain.gain.exponentialRampToValueAtTime(0.0001, start + 0.16);

        const dust = audioContext.createBufferSource();
        const dustBuffer = audioContext.createBuffer(1, Math.floor(audioContext.sampleRate * 0.06), audioContext.sampleRate);
        const dustData = dustBuffer.getChannelData(0);

        for (let index = 0; index < dustData.length; index += 1) {
          dustData[index] = (Math.random() * 2 - 1) * (1 - index / dustData.length);
        }

        const dustFilter = audioContext.createBiquadFilter();
        dustFilter.type = "highpass";
        dustFilter.frequency.value = 650;

        const dustGain = audioContext.createGain();
        dustGain.gain.setValueAtTime(0.06, start);
        dustGain.gain.exponentialRampToValueAtTime(0.0001, start + 0.07);

        dust.buffer = dustBuffer;
        clang.connect(clangGain);
        clangGain.connect(audioMaster);
        dust.connect(dustFilter);
        dustFilter.connect(dustGain);
        dustGain.connect(audioMaster);

        clang.start(start);
        clang.stop(start + 0.18);
        dust.start(start);
        dust.stop(start + 0.08);
      }

      function playLavaBubbleSound() {
        if (audioContext === null || audioMaster === null) {
          return;
        }

        const start = audioContext.currentTime;
        const bubble = audioContext.createOscillator();
        bubble.type = "sine";
        bubble.frequency.setValueAtTime(92, start);
        bubble.frequency.exponentialRampToValueAtTime(38, start + 0.18);

        const bubbleGain = audioContext.createGain();
        bubbleGain.gain.setValueAtTime(0.0001, start);
        bubbleGain.gain.exponentialRampToValueAtTime(0.045, start + 0.025);
        bubbleGain.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);

        bubble.connect(bubbleGain);
        bubbleGain.connect(audioMaster);
        bubble.start(start);
        bubble.stop(start + 0.24);
      }

      function handleKeyDown(event) {
        if (isGameKey(event.code)) {
          event.preventDefault();
        }

        switch (event.code) {
          case "KeyW":
          case "ArrowUp":
            move.forward = true;
            break;
          case "KeyS":
          case "ArrowDown":
            move.backward = true;
            break;
          case "KeyA":
          case "ArrowLeft":
            move.left = true;
            break;
          case "KeyD":
          case "ArrowRight":
            move.right = true;
            break;
          case "Space":
            if (canJump) {
              velocity.y = jumpSpeed;
              canJump = false;
            }
            break;
          default:
            break;
        }
      }

      function handleKeyUp(event) {
        if (isGameKey(event.code)) {
          event.preventDefault();
        }

        switch (event.code) {
          case "KeyW":
          case "ArrowUp":
            move.forward = false;
            break;
          case "KeyS":
          case "ArrowDown":
            move.backward = false;
            break;
          case "KeyA":
          case "ArrowLeft":
            move.left = false;
            break;
          case "KeyD":
          case "ArrowRight":
            move.right = false;
            break;
          default:
            break;
        }
      }

      function isGameKey(code) {
        switch (code) {
          case "KeyW":
          case "ArrowUp":
          case "KeyS":
          case "ArrowDown":
          case "KeyA":
          case "ArrowLeft":
          case "KeyD":
          case "ArrowRight":
          case "Space":
            return true;
          default:
            return false;
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(clock.getDelta(), 0.05);
        const time = clock.elapsedTime;

        updateLook(delta);
        updatePlayer(delta);
        updateMining(delta, time);
        updateLava(time, delta);
        updateAudio(time);
        updatePickaxe(time, delta);
        updateMessage(delta);

        renderer.render(scene, camera);
      }

      function updateLook(delta) {
        const lookMix = Math.min(delta * lookSharpness, 1);
        yaw += (targetYaw - yaw) * lookMix;
        pitch += (targetPitch - pitch) * lookMix;
        player.rotation.set(pitch, yaw, 0);
      }

      function updatePlayer(delta) {
        if (!gameStarted) {
          return;
        }

        velocity.y -= gravity * delta;

        const forwardInput = Number(move.forward) - Number(move.backward);
        const rightInput = Number(move.right) - Number(move.left);
        desiredMove.set(0, 0, 0);

        if (forwardInput !== 0 || rightInput !== 0) {
          player.getWorldDirection(forwardVector);
          forwardVector.y = 0;
          forwardVector.normalize();
          rightVector.crossVectors(forwardVector, player.up).normalize();
          desiredMove.addScaledVector(forwardVector, forwardInput);
          desiredMove.addScaledVector(rightVector, rightInput);
          desiredMove.normalize().multiplyScalar(walkSpeed);
        }

        const movementMix = Math.min(delta * movementSharpness, 1);
        velocity.x += (desiredMove.x - velocity.x) * movementMix;
        velocity.z += (desiredMove.z - velocity.z) * movementMix;

        player.position.x += velocity.x * delta;
        player.position.z += velocity.z * delta;
        player.position.y += velocity.y * delta;

        player.position.x = THREE.MathUtils.clamp(player.position.x, -worldHalfSize, worldHalfSize);
        player.position.z = THREE.MathUtils.clamp(player.position.z, -worldHalfSize, worldHalfSize);

        if (player.position.y < playerHeight) {
          velocity.y = 0;
          player.position.y = playerHeight;
          canJump = true;
        }
      }

      function updateMining(delta, time) {
        visibleCrystal = findCrystalInView();

        if (!mouseDown || visibleCrystal === null) {
          activeCrystal = null;
          miningProgress = 0;
          updateMiningBar();
          return;
        }

        if (activeCrystal !== visibleCrystal) {
          activeCrystal = visibleCrystal;
          miningProgress = 0;
        }

        miningProgress += delta;
        updateMiningBar();
        playMiningSound(time);

        if (miningProgress >= crystalMiningSeconds) {
          collectCrystal(activeCrystal);
          activeCrystal = null;
          visibleCrystal = null;
          miningProgress = 0;
          updateMiningBar();
        }
      }

      function playMiningSound(time) {
        if (time < nextPickaxeHitTime) {
          return;
        }

        playPickaxeHit();
        nextPickaxeHitTime = time + pickaxeHitSeconds;
      }

      function findCrystalInView() {
        raycaster.setFromCamera({ x: 0, y: 0 }, camera);
        const hits = raycaster.intersectObjects(crystalParts, false);

        for (const hit of hits) {
          const crystal = hit.object.userData.crystalRoot;
          if (crystal && hit.distance <= crystalReach && crystal.parent !== null) {
            return crystal;
          }
        }

        return null;
      }

      function updateMiningBar() {
        const active = activeCrystal !== null && mouseDown;
        minePanel.classList.toggle("visible", active);
        const percent = Math.min(miningProgress / crystalMiningSeconds, 1) * 100;
        mineFill.style.width = `${percent}%`;
      }

      function collectCrystal(crystal) {
        if (crystal === null) {
          throw new Error("Cannot collect a missing crystal.");
        }

        scene.remove(crystal);
        removeCrystalParts(crystal);
        minedCrystalCount += 1;
        crystalCountLabel.textContent = String(minedCrystalCount);
        showMessage("Lava crystal collected!");
      }

      function removeCrystalParts(crystal) {
        for (let index = crystalParts.length - 1; index >= 0; index -= 1) {
          if (crystalParts[index].userData.crystalRoot === crystal) {
            crystalParts.splice(index, 1);
          }
        }
      }

      function updateLava(time) {
        for (const bubble of lavaBubbles) {
          const phase = (time * 1.9 + bubble.seed * 0.37) % 1;
          const pulse = Math.sin(phase * Math.PI);
          bubble.mesh.position.y = bubble.baseY + pulse * 0.16;
          bubble.mesh.scale.setScalar(bubble.baseScale * (0.58 + pulse * 0.78));
          bubble.mesh.visible = phase < 0.94;
        }

        for (const spark of lavaSparks) {
          const phase = (time * spark.speed + spark.seed * 0.13) % 1;
          const angle = spark.seed * 2.39 + phase * 1.6;
          spark.mesh.position.set(
            spark.origin.x + Math.cos(angle) * spark.side * phase,
            spark.origin.y + phase * spark.height,
            spark.origin.z + Math.sin(angle) * spark.side * phase
          );
          spark.mesh.scale.setScalar(1 - phase * 0.75);
        }

        for (const drop of lavaDrops) {
          const phase = (time * drop.speed + drop.seed * 0.21) % 1;
          const point = lavaFlowPoint(phase);
          point.y += 0.28;
          drop.mesh.position.copy(drop.volcano.localToWorld(point));
        }
      }

      function updateAudio(time) {
        if (audioContext === null || !gameStarted || time < nextLavaBubbleSoundTime) {
          return;
        }

        playLavaBubbleSound();
        nextLavaBubbleSoundTime =
          time + lavaBubbleSoundMinSeconds + seededWave(time * 19.7) * lavaBubbleSoundSpreadSeconds;
      }

      function updatePickaxe(time, delta) {
        const targetSwing = activeCrystal !== null && mouseDown ? 1 : 0;
        pickaxeSwing += (targetSwing - pickaxeSwing) * Math.min(delta * 10, 1);

        const hit = Math.abs(Math.sin(time * 13)) * pickaxeSwing;
        pickaxe.rotation.x = -0.24 - hit * 0.48;
        pickaxe.rotation.y = -0.42 + hit * 0.16;
        pickaxe.rotation.z = -0.28 - hit * 0.12;
        pickaxe.position.y = -0.44 + hit * 0.08;
      }

      function updateMessage(delta) {
        if (messageTimer <= 0) {
          message.classList.remove("visible");
          return;
        }

        messageTimer -= delta;
        if (messageTimer <= 0) {
          message.classList.remove("visible");
        }
      }

      function showMessage(text) {
        message.textContent = text;
        message.classList.add("visible");
        messageTimer = 1.9;
      }

      function seededWave(value) {
        const wave = Math.sin(value * 12.9898) * 43758.5453;
        return wave - Math.floor(wave);
      }

      function resize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>
