<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roundcraft</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="startScreen">
      <div id="startBox">
        <h1>Roundcraft</h1>
        <p>Click to play.</p>
      </div>
    </div>

    <div id="hud">
      <div id="playerStatus">
        Hearts: <span id="heartCount">5</span><br />
        Flying: <span id="flyingState">No</span><br />
        Tool: <span id="toolState">Pickaxe</span>
      </div>
      <div id="inventory">
        Inventory<br />
        Lava Crystals: <span id="crystalCount">0</span><br />
        Diamonds: <span id="diamondCount">0</span><br />
        Diamond Pickaxes: <span id="diamondPickaxeCount">0</span><br />
        Dragon Meat: <span id="dragonMeatCount">0</span><br />
        Sheep Meat: <span id="sheepMeatCount">0</span>
      </div>
      <div id="message"></div>
      <div id="crosshair"></div>
      <div id="dragonPanel">
        <div id="dragonLabel">Round Dragon</div>
        <div id="dragonTrack"><div id="dragonFill"></div></div>
      </div>
      <div id="minePanel">
        <div id="mineLabel">Lava Crystal</div>
        <div id="mineTrack"><div id="mineFill"></div></div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
